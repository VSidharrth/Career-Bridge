{% extends "base.html" %}
{% block title %}Register - CareerBridge{% endblock %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md animate-fade-in-up">
        <div class="glass-card rounded-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl mx-auto mb-4">CB</div>
                <h1 class="text-2xl font-bold text-white">Create Account</h1>
                <p class="text-slate-400 text-sm mt-1">Join CareerBridge today</p>
            </div>

            {% if msg %}
            <div class="mb-6 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center">
                {{ msg }}
            </div>
            {% endif %}

            <form method="POST" action="/register" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Full Name</label>
                    <input type="text" name="name" required placeholder="John Doe"
                        class="input-dark w-full px-4 py-3 rounded-xl text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
                    <input type="email" name="email" required placeholder="you@example.com"
                        class="input-dark w-full px-4 py-3 rounded-xl text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                    <input type="password" name="password" required minlength="6" placeholder="Min 6 characters"
                        class="input-dark w-full px-4 py-3 rounded-xl text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-3">I am a</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="role" value="candidate" checked class="peer hidden">
                            <div class="p-4 rounded-xl border border-white/10 text-center transition-all peer-checked:border-indigo-500 peer-checked:bg-indigo-500/10 hover:bg-white/5">
                                <svg class="w-8 h-8 mx-auto mb-2 text-slate-400 peer-checked:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                                <span class="text-sm font-medium text-slate-300">Candidate</span>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="role" value="recruiter" class="peer hidden">
                            <div class="p-4 rounded-xl border border-white/10 text-center transition-all peer-checked:border-indigo-500 peer-checked:bg-indigo-500/10 hover:bg-white/5">
                                <svg class="w-8 h-8 mx-auto mb-2 text-slate-400 peer-checked:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                                </svg>
                                <span class="text-sm font-medium text-slate-300">Recruiter</span>
                            </div>
                        </label>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white btn-gradient text-sm">
                    Create Account
                </button>
            </form>

            <p class="text-center text-sm text-slate-400 mt-6">
                Already have an account?
                <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-medium transition">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
